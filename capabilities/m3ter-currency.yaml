      - name: listcurrencies
        method: GET
        description: List Currencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: The unique identifier (UUID) for your Organization. The Organization represents your company as a direct
            customer of our service.
          required: true
        - name: pageSize
          in: query
          type: integer
          description: Specifies the maximum number of Currencies to retrieve per page.
        - name: nextToken
          in: query
          type: string
          description: The `nextToken` for multi-page retrievals. It is used to fetch the next page of Currencies in a paginated
            list.
        - name: ids
          in: query
          type: array
          description: An optional parameter to filter the list based on specific Currency unique identifiers (UUIDs).
        - name: codes
          in: query
          type: array
          description: An optional parameter to retrieve specific Currencies based on their short codes.
        - name: archived
          in: query
          type: boolean
          description: Filter by archived flag. A True / False flag indicating whether to return Currencies that are archived
            *(obsolete)*.
