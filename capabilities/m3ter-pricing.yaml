naftiko: 1.0.0-alpha2
info:
  label: m3ter API — Pricing
  description: 'm3ter API — Pricing. 5 operations. Lead operation: List Pricings. Self-contained Naftiko capability covering
    one M3ter business surface.'
  tags:
  - M3ter
  - Pricing
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    M3TER_API_KEY: M3TER_API_KEY
capability:
  consumes:
  - type: http
    namespace: m3ter-pricing
    baseUri: https://api.m3ter.com
    description: m3ter API — Pricing business capability. Self-contained, no shared references.
    resources:
    - name: organizations-orgId-pricings
      path: /organizations/{orgId}/pricings
      operations:
      - name: listpricings
        method: GET
        description: List Pricings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: UUID of the organization. The Organization represents your company as a direct customer of the m3ter
            service.
          required: true
        - name: pageSize
          in: query
          type: integer
          description: Number of Pricings to retrieve per page.
        - name: nextToken
          in: query
          type: string
          description: '`nextToken` for multi-page retrievals.'
        - name: date
          in: query
          type: string
          description: Date on which to retrieve active Pricings.
        - name: planId
          in: query
          type: string
          description: UUID of the Plan to retrieve Pricings for.
        - name: planTemplateId
          in: query
          type: string
          description: UUID of the PlanTemplate to retrieve Pricings for.
        - name: aggregationId
          in: query
          type: string
          description: UUID of the Aggregation to retrieve pricings for
        - name: ids
          in: query
          type: array
          description: List of Pricing IDs to retrieve.
      - name: postpricing
        method: POST
        description: Create Pricing
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: UUID of the organization. The Organization represents your company as a direct customer of the m3ter
            service.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: organizations-orgId-pricings-id
      path: /organizations/{orgId}/pricings/{id}
      operations:
      - name: getpricing
        method: GET
        description: Retrieve Pricing
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: UUID of the organization. The Organization represents your company as a direct customer of the m3ter
            service.
          required: true
        - name: id
          in: path
          type: string
          description: The UUID of the Pricing to retrieve.
          required: true
      - name: putpricing
        method: PUT
        description: Update Pricing
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: UUID of the organization. The Organization represents your company as a direct customer of the m3ter
            service.
          required: true
        - name: id
          in: path
          type: string
          description: The UUID of the Pricing to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletepricing
        method: DELETE
        description: Delete Pricing
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: UUID of the organization. The Organization represents your company as a direct customer of the m3ter
            service.
          required: true
        - name: id
          in: path
          type: string
          description: The UUID of the Pricing to delete.
          required: true
    authentication:
      type: bearer
      token: '{{env.M3TER_API_KEY}}'
  exposes:
  - type: rest
    namespace: m3ter-pricing-rest
    port: 8080
    description: REST adapter for m3ter API — Pricing. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/organizations/{orgid}/pricings
      name: organizations-orgid-pricings
      description: REST surface for organizations-orgId-pricings.
      operations:
      - method: GET
        name: listpricings
        description: List Pricings
        call: m3ter-pricing.listpricings
        with:
          orgId: rest.orgId
          pageSize: rest.pageSize
          nextToken: rest.nextToken
          date: rest.date
          planId: rest.planId
          planTemplateId: rest.planTemplateId
          aggregationId: rest.aggregationId
          ids: rest.ids
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postpricing
        description: Create Pricing
        call: m3ter-pricing.postpricing
        with:
          orgId: rest.orgId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/organizations/{orgid}/pricings/{id}
      name: organizations-orgid-pricings-id
      description: REST surface for organizations-orgId-pricings-id.
      operations:
      - method: GET
        name: getpricing
        description: Retrieve Pricing
        call: m3ter-pricing.getpricing
        with:
          orgId: rest.orgId
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putpricing
        description: Update Pricing
        call: m3ter-pricing.putpricing
        with:
          orgId: rest.orgId
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletepricing
        description: Delete Pricing
        call: m3ter-pricing.deletepricing
        with:
          orgId: rest.orgId
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: m3ter-pricing-mcp
    port: 9090
    transport: http
    description: MCP adapter for m3ter API — Pricing. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-pricings
      description: List Pricings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: m3ter-pricing.listpricings
      with:
        orgId: tools.orgId
        pageSize: tools.pageSize
        nextToken: tools.nextToken
        date: tools.date
        planId: tools.planId
        planTemplateId: tools.planTemplateId
        aggregationId: tools.aggregationId
        ids: tools.ids
      outputParameters:
      - type: object
        mapping: $.
    - name: create-pricing
      description: Create Pricing
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: m3ter-pricing.postpricing
      with:
        orgId: tools.orgId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-pricing
      description: Retrieve Pricing
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: m3ter-pricing.getpricing
      with:
        orgId: tools.orgId
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-pricing
      description: Update Pricing
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: m3ter-pricing.putpricing
      with:
        orgId: tools.orgId
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-pricing
      description: Delete Pricing
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: m3ter-pricing.deletepricing
      with:
        orgId: tools.orgId
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
