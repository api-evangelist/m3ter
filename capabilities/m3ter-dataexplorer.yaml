naftiko: 1.0.0-alpha2
info:
  label: m3ter API — DataExplorer
  description: 'm3ter API — DataExplorer. 1 operations. Lead operation: Query and filter for bill line items.. Self-contained
    Naftiko capability covering one M3ter business surface.'
  tags:
  - M3ter
  - DataExplorer
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    M3TER_API_KEY: M3TER_API_KEY
capability:
  consumes:
  - type: http
    namespace: m3ter-dataexplorer
    baseUri: https://api.m3ter.com
    description: m3ter API — DataExplorer business capability. Self-contained, no shared references.
    resources:
    - name: organizations-orgId-dataexplorer-bills
      path: /organizations/{orgId}/dataexplorer/bills
      operations:
      - name: postquerybilldata
        method: POST
        description: Query and filter for bill line items.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: UUID of the organization.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.M3TER_API_KEY}}'
  exposes:
  - type: rest
    namespace: m3ter-dataexplorer-rest
    port: 8080
    description: REST adapter for m3ter API — DataExplorer. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/organizations/{orgid}/dataexplorer/bills
      name: organizations-orgid-dataexplorer-bills
      description: REST surface for organizations-orgId-dataexplorer-bills.
      operations:
      - method: POST
        name: postquerybilldata
        description: Query and filter for bill line items.
        call: m3ter-dataexplorer.postquerybilldata
        with:
          orgId: rest.orgId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: m3ter-dataexplorer-mcp
    port: 9090
    transport: http
    description: MCP adapter for m3ter API — DataExplorer. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: query-and-filter-bill-line
      description: Query and filter for bill line items.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: m3ter-dataexplorer.postquerybilldata
      with:
        orgId: tools.orgId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
