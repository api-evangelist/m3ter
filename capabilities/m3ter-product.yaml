naftiko: 1.0.0-alpha2
info:
  label: m3ter API — Product
  description: 'm3ter API — Product. 5 operations. Lead operation: List Products. Self-contained Naftiko capability covering
    one M3ter business surface.'
  tags:
  - M3ter
  - Product
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    M3TER_API_KEY: M3TER_API_KEY
capability:
  consumes:
  - type: http
    namespace: m3ter-product
    baseUri: https://api.m3ter.com
    description: m3ter API — Product business capability. Self-contained, no shared references.
    resources:
    - name: organizations-orgId-products
      path: /organizations/{orgId}/products
      operations:
      - name: listproducts
        method: GET
        description: List Products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: The unique identifier (UUID) of your Organization. The Organization represents your company as a direct
            customer of our service.
          required: true
        - name: pageSize
          in: query
          type: integer
          description: Specifies the maximum number of Products to retrieve per page.
        - name: nextToken
          in: query
          type: string
          description: The `nextToken` for multi-page retrievals. It is used to fetch the next page of Products in a paginated
            list.
        - name: ids
          in: query
          type: array
          description: List of specific Product UUIDs to retrieve.
      - name: postproduct
        method: POST
        description: Create Product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: The unique identifier (UUID) of your Organization. The Organization represents your company as a direct
            customer of our service.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: organizations-orgId-products-id
      path: /organizations/{orgId}/products/{id}
      operations:
      - name: getproduct
        method: GET
        description: Retrieve Product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: The unique identifier (UUID) of your Organization. The Organization represents your company as a direct
            customer of our service.
          required: true
        - name: id
          in: path
          type: string
          description: The unique identifier (UUID) of the Product to retrieve.
          required: true
      - name: putproduct
        method: PUT
        description: Update Product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: The unique identifier (UUID) of your Organization. The Organization represents your company as a direct
            customer of our service.
          required: true
        - name: id
          in: path
          type: string
          description: The unique identifer (UUID) of the Product to update.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteproduct
        method: DELETE
        description: Delete Product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: The unique identifier (UUID) of your Organization. The Organization represents your company as a direct
            customer of our service.
          required: true
        - name: id
          in: path
          type: string
          description: The unique identifer (UUID) of the Product to delete.
          required: true
    authentication:
      type: bearer
      token: '{{env.M3TER_API_KEY}}'
  exposes:
  - type: rest
    namespace: m3ter-product-rest
    port: 8080
    description: REST adapter for m3ter API — Product. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/organizations/{orgid}/products
      name: organizations-orgid-products
      description: REST surface for organizations-orgId-products.
      operations:
      - method: GET
        name: listproducts
        description: List Products
        call: m3ter-product.listproducts
        with:
          orgId: rest.orgId
          pageSize: rest.pageSize
          nextToken: rest.nextToken
          ids: rest.ids
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postproduct
        description: Create Product
        call: m3ter-product.postproduct
        with:
          orgId: rest.orgId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/organizations/{orgid}/products/{id}
      name: organizations-orgid-products-id
      description: REST surface for organizations-orgId-products-id.
      operations:
      - method: GET
        name: getproduct
        description: Retrieve Product
        call: m3ter-product.getproduct
        with:
          orgId: rest.orgId
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putproduct
        description: Update Product
        call: m3ter-product.putproduct
        with:
          orgId: rest.orgId
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteproduct
        description: Delete Product
        call: m3ter-product.deleteproduct
        with:
          orgId: rest.orgId
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: m3ter-product-mcp
    port: 9090
    transport: http
    description: MCP adapter for m3ter API — Product. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-products
      description: List Products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: m3ter-product.listproducts
      with:
        orgId: tools.orgId
        pageSize: tools.pageSize
        nextToken: tools.nextToken
        ids: tools.ids
      outputParameters:
      - type: object
        mapping: $.
    - name: create-product
      description: Create Product
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: m3ter-product.postproduct
      with:
        orgId: tools.orgId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-product
      description: Retrieve Product
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: m3ter-product.getproduct
      with:
        orgId: tools.orgId
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-product
      description: Update Product
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: m3ter-product.putproduct
      with:
        orgId: tools.orgId
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-product
      description: Delete Product
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: m3ter-product.deleteproduct
      with:
        orgId: tools.orgId
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
