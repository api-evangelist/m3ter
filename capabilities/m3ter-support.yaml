naftiko: 1.0.0-alpha2
info:
  label: m3ter API — Support
  description: 'm3ter API — Support. 2 operations. Lead operation: Retrieve Support Details. Self-contained Naftiko capability
    covering one M3ter business surface.'
  tags:
  - M3ter
  - Support
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    M3TER_API_KEY: M3TER_API_KEY
capability:
  consumes:
  - type: http
    namespace: m3ter-support
    baseUri: https://api.m3ter.com
    description: m3ter API — Support business capability. Self-contained, no shared references.
    resources:
    - name: organizations-orgId-support
      path: /organizations/{orgId}/support
      operations:
      - name: getsupport
        method: GET
        description: Retrieve Support Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: UUID of the organization
          required: true
      - name: putsupport
        method: PUT
        description: Request Support
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: UUID of the organization
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.M3TER_API_KEY}}'
  exposes:
  - type: rest
    namespace: m3ter-support-rest
    port: 8080
    description: REST adapter for m3ter API — Support. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/organizations/{orgid}/support
      name: organizations-orgid-support
      description: REST surface for organizations-orgId-support.
      operations:
      - method: GET
        name: getsupport
        description: Retrieve Support Details
        call: m3ter-support.getsupport
        with:
          orgId: rest.orgId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: putsupport
        description: Request Support
        call: m3ter-support.putsupport
        with:
          orgId: rest.orgId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: m3ter-support-mcp
    port: 9090
    transport: http
    description: MCP adapter for m3ter API — Support. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: retrieve-support-details
      description: Retrieve Support Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: m3ter-support.getsupport
      with:
        orgId: tools.orgId
      outputParameters:
      - type: object
        mapping: $.
    - name: request-support
      description: Request Support
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: m3ter-support.putsupport
      with:
        orgId: tools.orgId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
