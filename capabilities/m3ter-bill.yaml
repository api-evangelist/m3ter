        call: m3ter-bill.getlatestbill
        with:
          orgId: rest.orgId
          accountId: rest.accountId
          additional: rest.additional
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/organizations/{orgid}/bills/preview
      name: organizations-orgid-bills-preview
