      path: /organizations/{orgId}/externalmappings/external/{entity}/{m3terId}
      operations:
      - name: listexternalmappingsform3terentity
        method: GET
        description: List External Mappings for a m3ter Entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
