    - name: organizations-orgId-externalmappings-id
      path: /organizations/{orgId}/externalmappings/{id}
      operations:
      - name: getexternalmapping
        method: GET
        description: Retrieve External Mapping
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
