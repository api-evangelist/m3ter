        pageSize: tools.pageSize
        nextToken: tools.nextToken
        date: tools.date
        account: tools.account
        plan: tools.plan
        product: tools.product
        includeall: tools.includeall
        ids: tools.ids
        contract: tools.contract
      outputParameters:
      - type: object
        mapping: $.
    - name: create-accountplan
      description: Create AccountPlan
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: m3ter-accountplan.postaccountplan
      with:
        orgId: tools.orgId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-accountplan
      description: Retrieve AccountPlan
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: m3ter-accountplan.getaccountplan
      with:
        orgId: tools.orgId
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-accountplan
      description: Update AccountPlan
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: m3ter-accountplan.putaccountplan
      with:
        orgId: tools.orgId
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-accountplan
      description: Delete AccountPlan
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: m3ter-accountplan.deleteaccountplan
      with:
        orgId: tools.orgId
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: replace-accountplan
      description: Replace AccountPlan
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: m3ter-accountplan.replaceaccountplan
      with:
        orgId: tools.orgId
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
