          in: path
          type: string
          description: UUID of the organization
          required: true
        - name: pageSize
          in: query
          type: integer
          description: Number of UsageSavedQueries to retrieve per page
        - name: nextToken
          in: query
          type: string
          description: nextToken for multi page retrievals
        - name: ids
          in: query
