      path: /organizations/{orgId}/balances/{balanceId}/transactions/summary
      operations:
      - name: getbalancetransactionssummary
        method: GET
        description: Get Balance Transactions Summary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
