    description: m3ter API — Balances business capability. Self-contained, no shared references.
    resources:
    - name: organizations-orgId-balances
      path: /organizations/{orgId}/balances
      operations:
      - name: listbalances
        method: GET
        description: List Balances
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: The unique identifier (UUID) for your organization. The Organization represents your company as a direct
            customer of our service.
          required: true
        - name: pageSize
          in: query
          type: integer
          description: The maximum number of Balances to return per page.
        - name: nextToken
          in: query
          type: string
          description: The `nextToken` for retrieving the next page of Balances. It is used to fetch the next page of Balances
            in a paginated list.
        - name: accountId
          in: query
          type: string
          description: The unique identifier (UUID) for the end customer's account.
        - name: endDateStart
          in: query
          type: string
          description: Only include Balances with end dates equal to or later than this date. If a Balance has a rollover
            amount configured, then the `rolloverEndDate` will be used as
        - name: endDateEnd
          in: query
          type: string
          description: Only include Balances with end dates earlier than this date. If a Balance has a rollover amount configured,
            then the `rolloverEndDate` will be used as the end d
        - name: contract
          in: query
          type: string
        - name: contractId
          in: query
          type: string
          description: Filter Balances by contract id. Use '' with accountId to fetch unlinked balances.
        - name: ids
          in: query
          type: array
          description: A list of unique identifiers (UUIDs) for specific Balances to retrieve.
      - name: postbalance
        method: POST
        description: Create Balance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: The unique identifier (UUID) for your Organization. The Organization represents your company as a direct
            customer of our service.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: organizations-orgId-balances-balanceId-transactions
      path: /organizations/{orgId}/balances/{balanceId}/transactions
      operations:
      - name: listbalancetransactions
        method: GET
        description: List Transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: The unique identifier (UUID) for your Organization. The Organization represents your company as a direct
            customer of our service.
          required: true
        - name: balanceId
          in: path
          type: string
          description: The unique identifier (UUID) for the Balance whose Transactions you want to retrieve.
          required: true
        - name: pageSize
          in: query
          type: integer
          description: The maximum number of transactions to return per page.
        - name: nextToken
          in: query
          type: string
          description: '`nextToken` for multi page retrievals. A token for retrieving the next page of transactions. You''ll
