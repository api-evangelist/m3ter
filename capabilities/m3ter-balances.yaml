          in: path
          type: string
          description: UUID of the organization
          required: true
        - name: balanceId
          in: path
          type: string
          description: The UUID of the Balance
          required: true
    - name: organizations-orgId-balances-id
      path: /organizations/{orgId}/balances/{id}
      operations:
      - name: getbalance
        method: GET
        description: Retrieve Balance
        outputRawFormat: json
        outputParameters:
        - name: result
