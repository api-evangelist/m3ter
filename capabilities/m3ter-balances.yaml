naftiko: 1.0.0-alpha2
info:
  label: m3ter API — Balances
  description: 'm3ter API — Balances. 8 operations. Lead operation: List Balances. Self-contained Naftiko capability covering
    one M3ter business surface.'
  tags:
  - M3ter
  - Balances
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
