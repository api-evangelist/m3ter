naftiko: 1.0.0-alpha2
info:
  label: m3ter API — Aggregation
  description: 'm3ter API — Aggregation. 5 operations. Lead operation: List Aggregations. Self-contained Naftiko capability
    covering one M3ter business surface.'
  tags:
  - M3ter
  - Aggregation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
