naftiko: 1.0.0-alpha2
info:
  label: m3ter API — ExportAdHoc
  description: 'm3ter API — ExportAdHoc. 1 operations. Lead operation: Trigger data export.. Self-contained Naftiko capability
    covering one M3ter business surface.'
  tags:
  - M3ter
  - ExportAdHoc
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    M3TER_API_KEY: M3TER_API_KEY
capability:
  consumes:
  - type: http
    namespace: m3ter-exportadhoc
    baseUri: https://api.m3ter.com
    description: m3ter API — ExportAdHoc business capability. Self-contained, no shared references.
    resources:
    - name: organizations-orgId-dataexports-adhoc
      path: /organizations/{orgId}/dataexports/adhoc
      operations:
      - name: triggerdataexport
        method: POST
        description: Trigger data export.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgId
          in: path
          type: string
          description: UUID of the organization
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.M3TER_API_KEY}}'
  exposes:
  - type: rest
    namespace: m3ter-exportadhoc-rest
    port: 8080
    description: REST adapter for m3ter API — ExportAdHoc. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/organizations/{orgid}/dataexports/adhoc
      name: organizations-orgid-dataexports-adhoc
      description: REST surface for organizations-orgId-dataexports-adhoc.
      operations:
      - method: POST
        name: triggerdataexport
        description: Trigger data export.
        call: m3ter-exportadhoc.triggerdataexport
        with:
          orgId: rest.orgId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: m3ter-exportadhoc-mcp
    port: 9090
    transport: http
    description: MCP adapter for m3ter API — ExportAdHoc. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: trigger-data-export
      description: Trigger data export.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: m3ter-exportadhoc.triggerdataexport
      with:
        orgId: tools.orgId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
