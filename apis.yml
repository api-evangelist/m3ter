apis:
  - aid: m3ter:m3ter
    name: M3ter API
    description: >-
      The m3ter REST API provides programmatic access to the m3ter usage-based
      billing and metering platform. It is split into the Ingest API for
      submitting raw measurement data and the Config API for managing Accounts,
      Plans, Products, Aggregations, Counters, Meters, Pricing, Bills,
      Commitments, Contracts, Balances, BillJobs, Charges, Notifications,
      Events, Integrations, and Data Exports. Authentication uses OAuth 2.0
      Client Credentials. The base URL is https://api.m3ter.com.
    humanURL: https://www.m3ter.com/
