aid: m3ter
name: M3ter
description: >-
  m3ter is a usage-based billing and metering engine providing real-time usage
  data ingestion, pricing logic, and billing automation for API and SaaS
  products. The m3ter platform exposes two HTTP-based REST APIs returning JSON
  responses: an Ingest API for submitting raw usage measurements and a Config
  API for configuration and billing management. Authentication uses OAuth 2.0
  Client Credentials with a Service User Access Key id and Api Secret exchanged
  for a Bearer Token at https://api.m3ter.com/oauth/token.
type: Index
